services:
  - type: web
    name: student-project
    runtime: php
    buildCommand: "composer install && php artisan migrate --force && npm install && npm run build"
    startCommand: "php artisan serve --host 0.0.0.0 --port $PORT"
    envVars:
      - key: APP_KEY
        generate: true
      - key: APP_ENV
        value: production
      - key: DB_CONNECTION
        value: mysql
